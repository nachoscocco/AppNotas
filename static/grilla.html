<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
        }
        .card-header-urgent { background-color: #f8d7da; border-color: #f5c2c7; }
        .card-header-medium { background-color: #fff3cd; border-color: #ffe69c; }
        .card-header-low { background-color: #d1e7dd; border-color: #badbcc; }
    </style>
</head>
<body>
        <!-- 🔹 NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/grilla">
                    <i class="bi bi-journal-text"></i> Gestor de Notas
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
    
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/grilla">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/alta-nota">Nueva Nota</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="/notas-completadas">Completadas</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4"><i class="bi bi-card-checklist"></i> Mis notas</h1>
            <p class="lead">Un lugar para organizar tu día a día.</p>
        </div>

         <div class="d-flex justify-content-end mb-4">
            <a href="/alta-nota" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Nueva Nota
            </a>
        </div>

        <div class="mb-4">
            <button class="btn btn-outline-secondary w-100 text-start d-flex justify-content-between align-items-center"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#notasPendientes"
                    aria-expanded="true">
                <span>📌 Notas Pendientes</span>
                <i class="bi bi-chevron-down"></i>
            </button>

            <div class="collapse show mt-3" id="notasPendientes">
                <div id="lista-notas">
                    <!-- Acá se cargan las notas pendientes -->
                </div>
            </div>
        </div>
        <div class="mb-4">
            <button class="btn btn-outline-success w-100 text-start d-flex justify-content-between align-items-center"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#notasCompletadas"
                    aria-expanded="true">
                <span>✅ Notas Completadas</span>
                <i class="bi bi-chevron-down"></i>
            </button>

            <div class="collapse show mt-3" id="notasCompletadas">
                <div id="lista-notas-completadas">
                    <!-- Acá se cargan las notas pendientes -->
                </div>
            </div>
        </div>
        

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/grilla.js"></script>
</body>
</html>
