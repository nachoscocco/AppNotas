<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Un poco de estilo extra para que se vea mejor */
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
        }
        .card-header-urgent { background-color: #f8d7da; border-color: #f5c2c7; }
        .card-header-medium { background-color: #fff3cd; border-color: #ffe69c; }
        .card-header-low { background-color: #d1e7dd; border-color: #badbcc; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4"><i class="bi bi-card-checklist"></i> Mis Tareas</h1>
            <p class="lead">Un lugar para organizar tu día a día.</p>
        </div>

        <div class="card shadow-sm mb-5">
            <div class="card-body p-4">
                <h2 class="card-title h4">📝 Añadir nueva tarea</h2>
                <form id="form-nueva-tarea">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título</label>
                        <input type="text" class="form-control" id="titulo" placeholder="Ej: Preparar la reunión de equipo" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="3" placeholder="Añade más detalles sobre tu tarea..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="prioridad" class="form-label">Prioridad</label>
                        <select class="form-select" id="prioridad">
                            <option value="Media" selected>Media</option>
                            <option value="Urgente">Urgente</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg"></i> Agregar Tarea
                    </button>
                </form>
            </div>
        </div>

        <h2 class="mb-3">📌 Tareas Pendientes</h2>
        <div id="lista-tareas">
        </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/grilla.js"></script>
</body>
</html>
