<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Nota - Gestor de notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/grilla">
                <i class="bi bi-journal-text"></i> Gestor de Notas
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/grilla">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/alta-nota">Nueva Nota</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="/notas-completadas">Completadas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="display-4"><i class="bi bi-plus-circle"></i> Nueva Nota</h1>
            <p class="lead">Añade una nueva tarea a tu lista.</p>
        </div>

        <div class="d-flex justify-content-start mb-4">
            <a href="/grilla" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Volver a la grilla
            </a>
        </div>

        <div class="card shadow-sm mb-5">
            <div class="card-body p-4">
                <h2 class="card-title h4">📝 Añadir nueva nota</h2>
                <form id="form-nueva-nota" onsubmit="alta_nota(event)">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título</label>
                        <input type="text" class="form-control" id="titulo" placeholder="Ej: Preparar la reunión de equipo" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="3" placeholder="Añade más detalles sobre tu nota..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="prioridad" class="form-label">Prioridad</label>
                        <select class="form-select" id="prioridad">
                            <option value="Media" selected>Media</option>
                            <option value="Urgente">Urgente</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg"></i> Agregar nota
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/alta_nota.js"></script>
</body>
</html>
